<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こぐまり婚活診断</title>

<style>
body{font-family:sans-serif;background:#fff5f8;text-align:center;}
.container{max-width:700px;margin:auto;padding:20px;}
.card{background:#fff;padding:20px;margin:10px 0;border-radius:15px;}

.btn{
display:block;width:100%;margin:8px 0;padding:15px;
border-radius:10px;border:none;background:#ffe0eb;
}
.btn:hover{background:#ffb6d0;}

.hidden{display:none;}

.bar{background:#eee;height:15px;border-radius:10px;margin:5px 0;}
.fill{background:#ff6fa5;height:100%;border-radius:10px;}

button.main{
padding:15px;width:100%;background:#ff6fa5;color:#fff;
border:none;border-radius:10px;margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<div id="start">
<h1>🐻こぐまり婚活診断</h1>
<button class="main" onclick="next()">診断スタート</button>
</div>

<div id="quiz" class="hidden">
<div class="card">
<p id="q"></p>
<div id="choices"></div>
</div>
</div>

<div id="result" class="hidden">
<h2 id="totalRank"></h2>

<div class="card">
<p>市場価値 <span id="r1"></span></p>
<div class="bar"><div id="b1" class="fill"></div></div>

<p>生活適性 <span id="r2"></span></p>
<div class="bar"><div id="b2" class="fill"></div></div>

<p>恋愛偏差値 <span id="r3"></span></p>
<div class="bar"><div id="b3" class="fill"></div></div>

<p>結婚現実性 <span id="r4"></span></p>
<div class="bar"><div id="b4" class="fill"></div></div>
</div>

<p id="advice"></p>

<div style="background:#fff0f5;padding:15px;border-radius:10px;margin:15px 0;">
🐻 この結果はまだ“簡易診断”です<br><br>
あなた専用の詳細分析では<br>
✔ どこを直せばいいか<br>
✔ どんな相手と合うか<br>
✔ 最短ルート<br><br>
まで具体的にお伝えできます
※スクショを送るとより正確に分析できます
</div>

<button class="main" onclick="goLine()">🐻無料であなた専用の婚活戦略を受け取る</button>
</div>

</div>

<script>

const qs=[

["性別","gender",[["男性",1],["女性",2]]],

// 市場価値
["年齢","market",[["20代",10],["30前半",9],["30後半",7],["40以上",5]]],
["年収","market",[["〜300万",2],["300〜400万",4],["400〜600万",6],["600〜800万",8],["800万以上",10]]],
["業種","market",[["大手企業",10],["公務員",9],["研究職",9],["医療介護",7],["物流",6],["サービス",5],["その他",6]]],
["役職","market",[["経営者",10],["管理職",8],["主任",6],["一般",5]]],
["雇用","market",[["正社員",10],["契約",6],["アルバイト",3]]],
["学歴","market",[["院卒",10],["大卒",8],["専門",6],["高卒",4]]],
["身長","market",[["175以上",10],["170前後",7],["165前後",5],["それ以下",3]]],

// 生活
["一人暮らしの経験","life",[["現在している",10],["過去にある",7],["ない",5]]],
["貯蓄","life",[["1000万以上",10],["500万以上",8],["200万以上",6],["50万以上",4],["なし",2]]],
["喫煙","life",[["しない",10],["時々",5],["する",2]]],
["飲酒","life",[["しない",10],["週1",7],["頻繁",3]]],
["ギャンブル","life",[["しない",10],["たまに",5],["する",2]]],

// 恋愛
["清潔感","love",[["高い",10],["普通",6],["低い",3]]],
["会話力","love",[["高い",10],["普通",6],["低い",3]]],
["交際人数","love",[["10人以上",10],["5人以上",7],["1〜4人",5],["なし",3]]],
["柔軟性","love",[["ある",10],["普通",6],["ない",3]]],

// 現実
["理想","real",[["現実的",10],["やや高い",6],["高い",3]]],
["結婚意欲","real",[["すぐ",10],["1〜2年",7],["未定",3]]],
["改善意欲","real",[["高い",10],["普通",6],["低い",3]]],
["宗教","real",[["なし",10],["ゆるい",6],["あり",3]]]

];

let i=0,gender="male";
let score={market:0,life:0,love:0,real:0};
let fatal=false;

function next(val){

if(val!==undefined){
let type=qs[i-1][1];
let name=qs[i-1][0];

if(type==="gender"){gender=val===1?"male":"female";}
else{score[type]+=val;}

if(name==="ギャンブル" && val===2) fatal=true;
if(name==="宗教" && val===3) fatal=true;
if(name==="清潔感" && val===3) fatal=true;
if(name==="改善意欲" && val===3) fatal=true;
}

if(i===0){start.classList.add("hidden");quiz.classList.remove("hidden");}

if(i>=qs.length){show();return;}

q.innerText=qs[i][0];

choices.innerHTML="";
qs[i][2].forEach(v=>{
let b=document.createElement("button");
b.className="btn";
b.innerText=v[0];
b.onclick=()=>next(v[1]);
choices.appendChild(b);
});

i++;
}

function rank(x){
if(x>=90)return"S";
if(x>=75)return"A";
if(x>=60)return"B";
if(x>=45)return"C";
return"D";
}

function clamp(x){
return Math.max(0, Math.min(100, x));
}

function show(){

quiz.classList.add("hidden");
result.classList.remove("hidden");

let m=clamp(score.market*2);
let l=clamp(score.life*2);
let lo=clamp(score.love*2);
let r=clamp(score.real*2);

// Sなら100%
if(rank(m)==="S") m=100;
if(rank(l)==="S") l=100;
if(rank(lo)==="S") lo=100;
if(rank(r)==="S") r=100;

// 男女別
let total;
if(gender==="male"){
total = (m*1.5 + lo + l + r)/4;
}else{
total = (m + lo*1.5 + l*1.2 + r*1.3)/4;
}

if(fatal){
totalRank.innerText="総合：D（致命的課題あり）";
}else{
totalRank.innerText="総合："+rank(total)+"ランク";
}

// 表示
b1.style.width=m+"%";
b2.style.width=l+"%";
b3.style.width=lo+"%";
b4.style.width=r+"%";

r1.innerText=rank(m);
r2.innerText=rank(l);
r3.innerText=rank(lo);
r4.innerText=rank(r);

advice.innerText="🐻 弱点を改善すると評価は大きく変わります";

}

function goLine(){
location.href="https://page.line.me/818gjflb?openQrModal=true";
}

</script>
</body>
</html>
