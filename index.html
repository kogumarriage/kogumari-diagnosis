<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こぐまり婚活診断</title>

<style>
body{font-family:sans-serif;background:#fff5f8;text-align:center;}
.container{max-width:700px;margin:auto;padding:20px;}
.card{background:#fff;padding:20px;margin:10px 0;border-radius:15px;}
button{padding:15px;width:100%;background:#ff6fa5;color:#fff;border:none;border-radius:10px;}
.hidden{display:none;}
.bar{background:#eee;height:15px;border-radius:10px;margin:5px 0;}
.fill{background:#ff6fa5;height:100%;border-radius:10px;}
</style>
</head>

<body>
<div class="container">

<div id="start">
<h1>🐻こぐまり婚活診断</h1>
<button onclick="next()">診断スタート</button>
</div>

<div id="quiz" class="hidden">
<div class="card">
<p id="q"></p>
<select id="a"></select>
</div>
<button onclick="next()">次へ</button>
</div>

<div id="result" class="hidden">
<h2 id="totalRank"></h2>

<div class="card">
<p>市場価値</p><div class="bar"><div id="b1" class="fill"></div></div>
<p>生活適性</p><div class="bar"><div id="b2" class="fill"></div></div>
<p>恋愛偏差値</p><div class="bar"><div id="b3" class="fill"></div></div>
<p>結婚現実性</p><div class="bar"><div id="b4" class="fill"></div></div>
</div>

<p id="advice"></p>

<button onclick="goLine()">🐻作戦を受け取る</button>
</div>

</div>

<script>

const qs=[

/* 市場価値 */
["年齢","market",[["20代",10],["30前半",9],["30後半",7],["40以上",5]]],
["年収","market",[["〜300万",2],["300〜400万",4],["400〜600万",6],["600〜800万",8],["800万以上",10]]],
["職業","market",[
["会社員（大手）",10],
["会社員（中小）",7],
["公務員",9],
["経営者",8],
["個人事業主",6],
["非正規",3]
]],
["雇用安定性","market",[["安定",10],["普通",6],["不安定",3]]],

/* 生活 */
["一人暮らし","life",[["している",10],["実家",5]]],
["貯蓄","life",[
["1000万以上",10],
["500万以上",8],
["200万以上",6],
["50万以上",4],
["なし",2]
]],
["自炊","life",[["週3以上",10],["週1",6],["しない",3]]],
["生活リズム","life",[["安定",10],["普通",6],["不規則",3]]],

/* 恋愛偏差値 */
["清潔感","love",[["高い",10],["普通",6],["低い",3]]],
["会話力","love",[["高い",10],["普通",6],["低い",3]]],
["共感力","love",[["高い",10],["普通",6],["低い",3]]],
["柔軟性","love",[["ある",10],["普通",6],["ない",3]]],

/* 結婚現実性 */
["理想の高さ","real",[["現実的",10],["やや高い",6],["高い",3]]],
["結婚意欲","real",[["すぐしたい",10],["1〜2年",7],["未定",3]]],
["相手条件","real",[["広い",10],["普通",6],["狭い",3]]],
["改善意欲","real",[["高い",10],["普通",6],["低い",3]]

]

];

let i=0;
let score={market:0,life:0,love:0,real:0};

function next(){

if(i===0){
start.classList.add("hidden");
quiz.classList.remove("hidden");
}

if(i>0){
let val=+a.value;
let type=qs[i-1][1];
score[type]+=val;
}

if(i>=qs.length){show();return;}

q.innerText=qs[i][0];
a.innerHTML="";
qs[i][2].forEach(v=>{
let op=document.createElement("option");
op.value=v[1];
op.text=v[0];
a.appendChild(op);
});

i++;
}

function rank(x){
if(x>80)return"S";
if(x>60)return"A";
if(x>45)return"B";
if(x>30)return"C";
return"D";
}

function show(){

quiz.classList.add("hidden");
result.classList.remove("hidden");

let m=score.market*2;
let l=score.life*2;
let lo=score.love*2;
let r=score.real*2;

let total=(m+l+lo+r)/4;

totalRank.innerText="総合："+rank(total)+"ランク";

b1.style.width=m+"%";
b2.style.width=l+"%";
b3.style.width=lo+"%";
b4.style.width=r+"%";

advice.innerText="🐻 結婚現実性と恋愛偏差値を整えると一気に伸びます";

}

function goLine(){
location.href="https://page.line.me/818gjflb?openQrModal=true";
}

</script>
</body>
</html>
