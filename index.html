<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こぐまり婚活診断</title>

<style>
body {
  font-family: sans-serif;
  background: #fff5f8;
  margin: 0;
  text-align: center;
}
.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}
.card {
  background: white;
  padding: 20px;
  margin: 15px 0;
  border-radius: 15px;
}
button {
  padding: 15px;
  width: 100%;
  background: #ff6fa5;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}
.hidden { display:none; }
.bar { background:#eee; height:20px; border-radius:10px; }
.fill { height:100%; background:#ff6fa5; border-radius:10px; }
</style>
</head>

<body>
<div class="container">

<!-- スタート -->
<div id="start">
  <h1>🐻こぐまり婚活診断</h1>
  <button onclick="next()">診断スタート</button>
</div>

<!-- 質問 -->
<div id="quiz" class="hidden">
  <div class="card">
    <p id="question"></p>
    <select id="answer"></select>
  </div>
  <button onclick="next()">次へ</button>
</div>

<!-- 結果 -->
<div id="result" class="hidden">
  <h2 id="score"></h2>
  <p id="type"></p>
  <p id="advice"></p>

  <div class="card">
    <p>市場価値</p>
    <div class="bar"><div id="b1" class="fill"></div></div>

    <p>恋愛偏差値</p>
    <div class="bar"><div id="b2" class="fill"></div></div>

    <p>行動力</p>
    <div class="bar"><div id="b3" class="fill"></div></div>
  </div>

  <button onclick="goLine()">🐻相談する</button>
</div>

</div>

<script>

const questions = [
  {q:"年齢", type:"market", a:[
    ["20代",15],["30代前半",14],["30代後半",12],["40代以上",9]
  ]},
  {q:"年収", type:"market", a:[
    ["〜300万",3],["300〜399",5],["400〜499",6],["500〜599",8],["600以上",10]
  ]},
  {q:"職業の安定性", type:"market", a:[
    ["安定",5],["普通",3],["不安",1]
  ]},
  {q:"生活力（家事）", type:"life", a:[
    ["高い",5],["普通",3],["低い",1]
  ]},
  {q:"清潔感", type:"love", a:[
    ["良い",5],["普通",3],["低い",1]
  ]},
  {q:"コミュ力", type:"love", a:[
    ["高い",5],["普通",3],["低い",1]
  ]},
  {q:"柔軟性", type:"love", a:[
    ["ある",5],["普通",3],["ない",1]
  ]},
  {q:"申込み数", type:"action", a:[
    ["多い",10],["普通",6],["少ない",3]
  ]},
  {q:"デート頻度", type:"action", a:[
    ["多い",10],["普通",6],["少ない",3]
  ]}
];

let index = 0;
let market=0, love=0, action=0, life=0;

function next(){
  if(index===0){
    document.getElementById("start").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
  }

  if(index>0){
    let val = +document.getElementById("answer").value;
    let type = questions[index-1].type;

    if(type==="market") market+=val;
    if(type==="love") love+=val;
    if(type==="action") action+=val;
    if(type==="life") life+=val;
  }

  if(index>=questions.length){
    showResult();
    return;
  }

  let q = questions[index];
  document.getElementById("question").innerText = q.q;

  let sel = document.getElementById("answer");
  sel.innerHTML="";
  q.a.forEach(v=>{
    let op=document.createElement("option");
    op.value=v[1];
    op.text=v[0];
    sel.appendChild(op);
  });

  index++;
}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let total = market + love + action + life;

  let type="", advice="";
  if(total>60){
    type="バランス型";
    advice="このまま続ければ成婚に近い状態です";
  }else if(total>40){
    type="努力型";
    advice="方向性を整えると一気に伸びます";
  }else{
    type="改善型";
    advice="行動と考え方の改善で大きく変わります";
  }

  document.getElementById("score").innerText="総合："+total+"点";
  document.getElementById("type").innerText=type;
  document.getElementById("advice").innerText=advice;

  document.getElementById("b1").style.width=(market*3)+"%";
  document.getElementById("b2").style.width=(love*6)+"%";
  document.getElementById("b3").style.width=(action*5)+"%";
}

function goLine(){
  window.location.href="https://line.me/";
}

</script>
</body>
</html>
