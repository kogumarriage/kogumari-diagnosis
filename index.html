<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こぐまり婚活診断</title>

<style>
body{font-family:sans-serif;background:#fff5f8;text-align:center;}
.container{max-width:700px;margin:auto;padding:20px;}
.card{background:#fff;padding:20px;margin:10px 0;border-radius:15px;}
button{padding:15px;width:100%;background:#ff6fa5;color:#fff;border:none;border-radius:10px;}
.hidden{display:none;}
.bar{background:#eee;height:15px;border-radius:10px;margin:5px 0;}
.fill{background:#ff6fa5;height:100%;border-radius:10px;}
.rank{font-weight:bold;margin-bottom:5px;}
</style>
</head>

<body>
<div class="container">

<div id="start">
<h1>🐻こぐまり婚活診断</h1>
<button onclick="next()">診断スタート</button>
</div>

<div id="quiz" class="hidden">
<div class="card">
<p id="q"></p>
<select id="a"></select>
</div>
<button onclick="next()">次へ</button>
</div>

<div id="result" class="hidden">
<h2 id="totalRank"></h2>

<div class="card">
<p>市場価値 <span id="r1" class="rank"></span></p>
<div class="bar"><div id="b1" class="fill"></div></div>

<p>生活適性 <span id="r2" class="rank"></span></p>
<div class="bar"><div id="b2" class="fill"></div></div>

<p>恋愛偏差値 <span id="r3" class="rank"></span></p>
<div class="bar"><div id="b3" class="fill"></div></div>

<p>結婚現実性 <span id="r4" class="rank"></span></p>
<div class="bar"><div id="b4" class="fill"></div></div>
</div>

<p id="advice"></p>

<button onclick="goLine()">🐻無料相談を受ける</button>
</div>

</div>

<script>

const qs=[

["性別","gender",[["男性",1],["女性",2]]],

["年齢","market",[["20代",10],["30前半",9],["30後半",7],["40以上",5]]],
["年収","market",[["〜300万",2],["300〜400万",4],["400〜600万",6],["600〜800万",8],["800万以上",10]]],
["職業","market",[
["会社員（大手）",10],
["会社員（中小）",7],
["公務員",9],
["経営者",8],
["個人事業主",6],
["非正規",3]
]],

["一人暮らし","life",[["している",10],["実家",5]]],
["貯蓄","life",[["1000万以上",10],["500万以上",8],["200万以上",6],["50万以上",4],["なし",2]]],
["自炊","life",[["週3以上",10],["週1",6],["しない",3]]],

["清潔感","love",[["高い",10],["普通",6],["低い",3]]],
["会話力","love",[["高い",10],["普通",6],["低い",3]]],
["柔軟性","love",[["ある",10],["普通",6],["ない",3]]],

["理想の高さ","real",[["現実的",10],["やや高い",6],["高い",3]]],
["結婚意欲","real",[["すぐしたい",10],["1〜2年",7],["未定",3]]]

];

let i=0;
let gender="male";
let score={market:0,life:0,love:0,real:0};

function next(){

if(i===0){
start.classList.add("hidden");
quiz.classList.remove("hidden");
}

if(i>0){
let val=+a.value;
let type=qs[i-1][1];

if(type==="gender"){
gender = val===1?"male":"female";
}else{
score[type]+=val;
}
}

if(i>=qs.length){show();return;}

q.innerText=qs[i][0];
a.innerHTML="";
qs[i][2].forEach(v=>{
let op=document.createElement("option");
op.value=v[1];
op.text=v[0];
a.appendChild(op);
});

i++;
}

function rank(x){
if(x>=80)return"S";
if(x>=65)return"A";
if(x>=50)return"B";
if(x>=35)return"C";
return"D";
}

function show(){

quiz.classList.add("hidden");
result.classList.remove("hidden");

let m=score.market*2;
let l=score.life*2;
let lo=score.love*2;
let r=score.real*2;

let total;

// 男女別アルゴリズム
if(gender==="male"){
total = m*1.5 + lo*1.0 + l*1.0 + r*1.0;
}else{
total = m*1.0 + lo*1.5 + l*1.2 + r*1.3;
}

total = total / 4;

totalRank.innerText="総合："+rank(total)+"ランク";

// バー
b1.style.width=m+"%";
b2.style.width=l+"%";
b3.style.width=lo+"%";
b4.style.width=r+"%";

// ランク表示
r1.innerText=rank(m);
r2.innerText=rank(l);
r3.innerText=rank(lo);
r4.innerText=rank(r);

// アドバイス
if(gender==="male"){
advice.innerText="🐻 年収・安定性と行動で一気に伸びます";
}else{
advice.innerText="🐻 恋愛偏差値と柔軟性を整えると一気に変わります";
}

}

function goLine(){
location.href="https://page.line.me/818gjflb?openQrModal=true";
}

</script>
</body>
</html>
